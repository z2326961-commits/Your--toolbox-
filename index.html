<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartToolbox - Free Online AI Writer & Utility Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>.gradient-bg { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }</style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 min-h-screen flex flex-col">
    <header class="bg-white shadow-sm border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center space-x-3">
                <div class="gradient-bg p-2.5 rounded-xl text-white shadow-md"><i class="fa-solid fa-screwdriver-wrench text-xl"></i></div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-gray-900">Smart<span class="text-indigo-600">Toolbox</span></h1>
                    <p class="text-xs text-gray-500">Free high-quality web utilities</p>
                </div>
            </div>
            <nav class="flex space-x-1 bg-gray-100 p-1 rounded-xl">
                <button onclick="switchTab('ai-writer')" id="tab-ai-writer" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium bg-white text-indigo-600 shadow-sm">AI Assistant</button>
                <button onclick="switchTab('qr-gen')" id="tab-qr-gen" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium text-gray-600">QR Generator</button>
            </nav>
        </div>
    </header>
    <main class="flex-grow max-w-4xl mx-auto w-full px-4 py-8">
        <section id="sec-ai-writer" class="tab-content block">
            <div class="bg-white rounded-2xl shadow-xl border p-6 space-y-6">
                <textarea id="ai-prompt" rows="3" class="w-full p-3 border rounded-xl" placeholder="Write something..."></textarea>
                <input type="password" id="api-key-input" class="w-full p-3 border rounded-xl" placeholder="Paste Gemini API Key...">
                <button onclick="generateAIContent()" class="w-full gradient-bg text-white font-semibold py-4 rounded-xl">Generate Content</button>
                <div id="ai-output-container" class="hidden"><div id="ai-output-text" class="p-4 bg-gray-50 border rounded-xl whitespace-pre-wrap"></div></div>
            </div>
        </section>
    </main>
    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`sec-${tabId}`).classList.remove('hidden');
        }
        async function generateAIContent() {
            const prompt = document.getElementById('ai-prompt').value;
            const apiKey = document.getElementById('api-key-input').value;
            if(!prompt || !apiKey) return;
            const out = document.getElementById('ai-output-text');
            document.getElementById('ai-output-container').classList.remove('hidden');
            out.innerText = "AI is thinking...";
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                out.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) { out.innerText = "Error generating content."; }
        }
    </script>
</body>
</html>
