<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartToolbox - Free Online AI Writer & Utility Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white shadow-sm border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center space-x-3">
                <div class="gradient-bg p-2.5 rounded-xl text-white shadow-md">
                    <i class="fa-solid fa-screwdriver-wrench text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-gray-900">Smart<span class="text-indigo-600">Toolbox</span></h1>
                    <p class="text-xs text-gray-500">Free high-quality web utilities</p>
                </div>
            </div>
            <nav class="flex space-x-1 bg-gray-100 p-1 rounded-xl">
                <button onclick="switchTab('ai-writer')" id="tab-ai-writer" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium bg-white text-indigo-600 shadow-sm">AI Assistant</button>
                <button onclick="switchTab('qr-gen')" id="tab-qr-gen" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium text-gray-600">QR Generator</button>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-4xl mx-auto w-full px-4 py-8">
        
        <!-- Tab 1: AI Assistant -->
        <section id="sec-ai-writer" class="tab-content active">
            <div class="bg-white rounded-2xl shadow-xl border p-6 space-y-6">
                <div class="border-b pb-2">
                    <h2 class="text-lg font-bold text-gray-800"><i class="fa-solid fa-robot text-indigo-600 mr-2"></i>AI Smart Writer</h2>
                    <p class="text-xs text-gray-500">Generate high-quality articles, essays, or scripts using AI</p>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">What do you want to write?</label>
                    <textarea id="ai-prompt" rows="4" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="e.g., Write a YouTube script about amazing facts..."></textarea>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Gemini API Key</label>
                    <input type="password" id="api-key-input" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="Paste your Gemini API Key here...">
                </div>
                <button onclick="generateAIContent()" class="w-full gradient-bg text-white font-semibold py-4 rounded-xl shadow-lg hover:opacity-90 transition">Generate Content</button>
                <div id="ai-output-container" class="hidden space-y-2">
                    <label class="block text-sm font-semibold text-gray-700">Output:</label>
                    <div id="ai-output-text" class="p-4 bg-gray-50 border rounded-xl whitespace-pre-wrap text-gray-700"></div>
                </div>
            </div>
        </section>

        <!-- Tab 2: QR Generator -->
        <section id="sec-qr-gen" class="tab-content">
            <div class="bg-white rounded-2xl shadow-xl border p-6 space-y-6">
                <div class="border-b pb-2">
                    <h2 class="text-lg font-bold text-gray-800"><i class="fa-solid fa-qrcode text-indigo-600 mr-2"></i>Instant QR Code Generator</h2>
                    <p class="text-xs text-gray-500">Convert links, text, or phone numbers into a QR Code</p>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Enter Text or URL Link</label>
                    <input type="text" id="qr-text" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="e.g., https://google.com">
                </div>
                <button onclick="generateQRCode()" class="w-full gradient-bg text-white font-semibold py-4 rounded-xl shadow-lg hover:opacity-90 transition">Generate QR Code</button>
                <div id="qr-output-container" class="hidden flex flex-col items-center justify-center p-6 bg-gray-50 border rounded-xl space-y-4">
                    <div id="qrcode" class="p-2 bg-white border rounded-lg shadow-sm"></div>
                    <p class="text-xs text-gray-500">Long press the image to download or save your QR Code</p>
                </div>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="bg-white border-t py-4 text-center text-sm text-gray-500">
        &copy; 2026 SmartToolbox. Created with ❤️
    </footer>

    <!-- Scripts -->
    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-white', 'text-indigo-600', 'shadow-sm');
                btn.classList.add('text-gray-600');
            });
            
            document.getElementById(`sec-${tabId}`).classList.add('active');
            const activeBtn = document.getElementById(`tab-${tabId}`);
            activeBtn.classList.add('bg-white', 'text-indigo-600', 'shadow-sm');
            activeBtn.classList.remove('text-gray-600');
        }

        async function generateAIContent() {
            const prompt = document.getElementById('ai-prompt').value;
            const apiKey = document.getElementById('api-key-input').value;
            if(!prompt || !apiKey) {
                alert("Please fill in both the prompt and API key fields.");
                return;
            }
            const outContainer = document.getElementById('ai-output-container');
            const outText = document.getElementById('ai-output-text');
            outContainer.classList.remove('hidden');
            outText.innerText = "AI is thinking... Please wait...";
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                if(data.candidates && data.candidates[0].content.parts[0].text) {
                    outText.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    outText.innerText = "Error: Invalid API key or request. Please check your credentials.";
                }
            } catch (e) { 
                outText.innerText = "Failed to connect to AI server. Please try again."; 
            }
        }

        let qrcodeInstance = null;
        function generateQRCode() {
            const text = document.getElementById('qr-text').value;
            if(!text) {
                alert("Please enter some text or a link.");
                return;
            }
            const container = document.getElementById('qr-output-container');
            const qrDiv = document.getElementById('qrcode');
            qrDiv.innerHTML = "";
            container.classList.remove('hidden');
            
            qrcodeInstance = new QRCode(qrDiv, {
                text: text,
                width: 180,
                height: 180,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }
    </script>
</body>
</html>
